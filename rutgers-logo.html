<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rutgers Network Logo Capture</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --rutgers-scarlet: #cc0033;
      --rutgers-deep-red: #8b0000;
      --rutgers-crimson: #e0115f;
      --rutgers-rose: #ff4d6d;
      --rutgers-dark: #3b0000;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      background:
        radial-gradient(circle at 20% 20%, rgba(255, 77, 109, 0.35), transparent 45%),
        radial-gradient(circle at 80% 30%, rgba(224, 17, 95, 0.35), transparent 40%),
        linear-gradient(135deg, var(--rutgers-dark), var(--rutgers-deep-red) 40%, var(--rutgers-scarlet) 75%, var(--rutgers-crimson));
      color: #ffffff;
      font-family: "Space Grotesk", sans-serif;
      overflow: hidden;
      padding-left: clamp(24px, 7vw, 120px);
    }

    .logo {
      text-align: left;
      font-weight: 700;
      font-size: clamp(64px, 14vw, 220px);
      line-height: 0.86;
      letter-spacing: -0.06em;
      text-transform: lowercase;
      text-shadow: 0 10px 40px rgba(0, 0, 0, 0.35);
      user-select: none;
    }
  </style>
</head>
<body>
  <h1 class="logo">rutgers.<br />network</h1>
</body>
</html>
